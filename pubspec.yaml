name: pill_dispenser
description: Aplicație pentru dozator de pastile controlat prin BLE HM-10.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # BLE
  flutter_blue_plus: ^1.31.0
  
  # Local storage
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # UI & State Management
  provider: ^6.0.0
  intl: ^0.19.0
  
  # Utilities
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

# Android configuration
android:
  compileSdkVersion: 34
  minSdkVersion: 21
  targetSdkVersion: 34

