name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (fara codesign)
        run: flutter build ios --release --no-codesign

      - name: Creeaza IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../../PillDispenser.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PillDispenser-iOS
          path: PillDispenser.ipa
          retention-days: 30
